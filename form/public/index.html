<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Formulario de Contacto</h1>
        <form id="contactForm">
            <label for="firstName">Nombre:<span class="required">*</span></label>
            <input type="text" id="firstName" name="firstName" required>

            <label for="lastName">Apellidos:<span class="required">*</span></label>
            <input type="text" id="lastName" name="lastName" required>

            <label for="email">Correo Electrónico:<span class="required">*</span></label>
            <input type="email" id="email" name="email" required>

            <label for="subject">Asunto:<span class="required">*</span></label>
            <input type="text" id="subject" name="subject" required>

            <label for="message">Mensaje:</label>
            <textarea id="message" name="message"></textarea>

            <button type="submit">Enviar</button>
        </form>
        <div id="responseMessage" class="hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
