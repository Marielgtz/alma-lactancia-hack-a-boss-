<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Navegación</title>
    <link rel="stylesheet" href="navBar.css">
</head>
<body>
    <header>
        <header>
            <nav class="navbar">
                <img src="logoAlma.png" alt="Logo Alma" class="logo">
                <ul class="menu">
                <li class="menu-item">
                    <a href="#">Inicio</a>                    
                </li>
                <li class="menu-item">
                    <a href="#">¿Quiénes somos?</a>                    
                </li>
                <li class="menu-item">
                    <a href="#">Actividades</a>
                    <ul class="submenu">
                        <li><a href="#">Próximas Inscripciones</a></li>
                        <li><a href="#">Histórico</a></li>
                    </ul>
                </li>
                <li class="menu-item">
                    <a href="#">Biblioteca</a>
                </li>
                <li class="menu-item">
                    <a href="#">Contacto</a>
                </li>
            </ul>
            </nav>
    </header>

    <script>
        document.querySelectorAll('.menu-item > a').forEach(item => {
            item.addEventListener('click', event => {
                const submenu = item.nextElementSibling;
                if (submenu) {
                    event.preventDefault();
                    submenu.classList.toggle('active');
                }
            });
        });
    </script>
</body>
</html>
